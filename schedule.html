<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>재경혜 일정</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <meta name="theme-color" content="#eceae6" />
    <meta name="color-scheme" content="light" />
    <meta name="supported-color-schemes" content="light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="재경혜" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
      :root {
        --ui: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
        --jae: #3E6FE0; --kyung: #2F9C8B; --hye: #E0648C;
        --accent: #E0683A; --selected: #1f2937;
        --shadow-card: 0 1px 4px rgba(17,24,39,.05);
        --shadow-phone: 0 30px 70px rgba(17,24,39,.18);
      }
      * { box-sizing: border-box; }
      html { color-scheme: light; }
      html, body { margin: 0; padding: 0; background: #eceae6; font-family: var(--ui); -webkit-font-smoothing: antialiased; color: #111; }
      body { min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; }
      button { font-family: inherit; cursor: pointer; }
      input, textarea, select { font-family: inherit; }
      a { color: inherit; text-decoration: none; }
      .phone-outer { width: 100%; max-width: 412px; padding: 16px 10px 24px; }
      @media (min-width: 480px) { .phone-outer { padding: 32px 10px; } }
      .phone { background: #fff; border-radius: 38px; box-shadow: var(--shadow-phone), 0 2px 10px rgba(17,24,39,.06); padding: 10px; }
      .screen { background: #fafafa; border-radius: 30px; overflow: hidden; border: 1px solid #f0f0f0; position: relative; }
      .sync-row { display: flex; justify-content: center; padding: 10px 8px 2px; }
      .sync-indicator { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; color: #6b7280; font-weight: 600; background: rgba(255,255,255,0.9); padding: 3px 10px; border-radius: 999px; border: 1px solid #ececec; }
      .sync-indicator.error .sync-dot { background: #d9534f; }
      .topbar { padding: 4px 18px 6px !important; }
      .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #9ca3af; }
      .sync-indicator.cloud .sync-dot { background: #2F9C8B; }
      .sync-indicator.local .sync-dot { background: #E0683A; }
      .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 6px; }
      .back-btn { background: transparent; border: none; padding: 6px 4px; margin-left: -4px; color: #374151; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 4px; }
      .who-am-i { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6b7280; font-weight: 500; }
      .who-am-i select { background: #fff; border: 1px solid #e5e5e2; border-radius: 999px; padding: 4px 8px 4px 10px; font-size: 12px; font-weight: 700; color: #111; }
      .header { padding: 8px 24px 8px; display: flex; align-items: center; justify-content: space-between; }
      .month-label { display: flex; align-items: baseline; gap: 8px; }
      .month-num { font-weight: 800; font-size: 25px; color: #111; letter-spacing: -.02em; }
      .year-num { font-weight: 600; font-size: 14px; color: #b0b0b0; }
      .month-nav { background: transparent; border: none; font-size: 18px; color: #6b7280; padding: 4px 8px; border-radius: 8px; }
      .month-nav:hover { background: #f3f3f3; color: #111; }
      .member-stack { display: flex; align-items: center; }
      .member-stack .avatar { width: 29px; height: 29px; border-radius: 50%; color: #fff; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; box-shadow: 0 1px 3px rgba(0,0,0,.12); }
      .member-stack .avatar + .avatar { margin-left: -9px; }
      .card { background: #fff; border-radius: 18px; box-shadow: var(--shadow-card); }
      .calendar { margin: 6px 18px 0; padding: 14px 14px 12px; }
      .dow-row { display: flex; margin-bottom: 8px; }
      .dow-row span { flex: 1; text-align: center; font-weight: 700; font-size: 11px; color: #9aa0aa; }
      .dow-row .sat { color: var(--jae); }
      .dow-row .sun { color: #d9534f; }
      .week-row { display: flex; }
      .day-cell { flex: 1; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
      .day-cell.empty { cursor: default; }
      .day-bubble { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: #374151; border: 1.5px solid transparent; transition: background 0.12s ease; }
      .day-bubble.has-event { background: #EBEFF7; }
      .day-bubble.today { color: var(--accent); border-color: var(--accent); font-weight: 700; }
      .day-bubble.selected { background: var(--selected); color: #fff; font-weight: 700; border-color: var(--selected); }
      .calendar-legend { display: flex; align-items: center; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f3f3f3; }
      .legend-chip { width: 13px; height: 13px; border-radius: 5px; background: #EBEFF7; }
      .legend-text { font-size: 11px; color: #9aa0aa; font-weight: 500; }
      .week-strip { margin: 12px 18px 0; padding: 6px; display: flex; gap: 2px; }
      .week-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 8px 0; border-radius: 13px; cursor: pointer; background: transparent; border: none; color: inherit; }
      .week-col .dow { font-weight: 600; font-size: 11px; color: #9ca3af; }
      .week-col .date { font-weight: 700; font-size: 15px; color: #374151; }
      .week-col .dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; }
      .week-col.weekend .dow { color: #9aa0aa; }
      .week-col.today .dot { background: var(--accent); }
      .week-col.selected { background: #111; }
      .week-col.selected .dow, .week-col.selected .date { color: #fff; }
      .week-col.selected.today .dot { background: #fff; }
      .day-header { display: flex; align-items: center; gap: 8px; padding: 18px 24px 10px; }
      .day-header__label { font-weight: 700; font-size: 17px; color: #111; }
      .today-chip { font-weight: 700; font-size: 10px; color: #fff; background: var(--accent); border-radius: 999px; padding: 3px 8px; }
      .add-btn { margin-left: auto; background: var(--selected); color: #fff; border: none; border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
      .add-btn:hover { background: #000; }
      .timeline { padding: 2px 24px 4px; }
      .timeline-empty { text-align: center; padding: 28px 12px; color: #9ca3af; font-size: 13px; font-weight: 500; }
      .entry { display: flex; gap: 13px; }
      .entry__rail { display: flex; flex-direction: column; align-items: center; width: 42px; flex: none; }
      .entry__time { font-weight: 700; font-size: 12px; color: #374151; margin-top: 2px; }
      .entry__node { width: 11px; height: 11px; border-radius: 50%; margin-top: 7px; border: 2.5px solid #fff; background: var(--node-color, var(--jae)); box-shadow: 0 0 0 1.5px var(--node-color, var(--jae)); }
      .entry__line { flex: 1; width: 2px; background: #ececec; margin-top: 2px; min-height: 18px; }
      .entry__card { flex: 1; margin-bottom: 12px; background: #fff; border-radius: 14px; padding: 13px 15px; cursor: pointer; box-shadow: var(--shadow-card); border-left: 4px solid var(--node-color, var(--jae)); }
      .entry__head { display: flex; align-items: center; gap: 8px; }
      .entry__title { font-weight: 600; font-size: 15px; color: #1f2937; flex: 1; letter-spacing: -.01em; }
      .entry__badge { width: 22px; height: 22px; border-radius: 50%; color: #fff; font-weight: 700; font-size: 11px; display: flex; align-items: center; justify-content: center; background: var(--node-color, var(--jae)); }
      .entry__span { font-size: 10px; font-weight: 700; color: var(--node-color, var(--jae)); background: rgba(0,0,0,0.04); border-radius: 6px; padding: 1px 6px; letter-spacing: 0.01em; }
      .entry__detail { margin-top: 11px; padding-top: 11px; border-top: 1px solid #f1f1f1; }
      .entry__detail .row { margin-bottom: 5px; font-size: 13px; }
      .entry__detail .row.time { color: #374151; font-weight: 600; }
      .entry__detail .row.loc, .entry__detail .row.memo { color: #6b7280; font-weight: 500; }
      .entry__detail .row.memo { margin-bottom: 8px; }
      .entry__actions { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
      .entry__meta-text { font-size: 11px; color: #9ca3af; font-weight: 500; flex: 1; }
      .entry__edit, .entry__del { background: transparent; border: 1px solid #e5e5e2; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px; }
      .entry__edit { color: #374151; }
      .entry__edit:hover { background: #f3f3f3; }
      .entry__del { color: #d9534f; border-color: #f5c8c4; }
      .entry__del:hover { background: #fdecea; }
      .checklist { margin: 8px 18px 22px; padding: 16px 18px; }
      .checklist__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
      .checklist__title { font-weight: 700; font-size: 14px; color: #111; }
      .checklist__count { font-weight: 600; font-size: 11px; color: var(--jae); }
      .check-item { display: flex; align-items: center; gap: 11px; padding: 8px 0; cursor: pointer; }
      .check-box { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #d8d8d4; background: transparent; color: #fff; font-weight: 700; font-size: 11px; display: flex; align-items: center; justify-content: center; flex: none; }
      .check-item.done .check-box { background: #111; border-color: #111; }
      .check-body { flex: 1; min-width: 0; }
      .check-label { font-weight: 600; font-size: 14px; color: #374151; }
      .check-item.done .check-label { color: #bdbdba; text-decoration: line-through; }
      .check-due { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; color: #6b7280; background: #f3f3f3; border-radius: 6px; padding: 1px 6px; margin-left: 6px; vertical-align: 1px; }
      .check-due.overdue { color: #d9534f; background: #fdecea; }
      .check-due.today { color: var(--accent); background: #fbede5; }
      .check-item.done .check-due { color: #bdbdba; background: #f6f6f6; }
      .check-who { width: 20px; height: 20px; border-radius: 50%; color: #fff; font-weight: 700; font-size: 10px; display: flex; align-items: center; justify-content: center; flex: none; cursor: pointer; }
      .check-del { background: transparent; border: none; color: #c0c0bd; padding: 2px 4px; font-size: 14px; line-height: 1; opacity: 0; transition: opacity 0.15s ease; }
      .check-item:hover .check-del { opacity: 1; }
      .add-checklist { display: flex; align-items: center; gap: 9px; margin-top: 6px; padding: 8px 0; color: #c0c0bd; background: transparent; border: none; width: 100%; text-align: left; }
      .add-checklist__icon { width: 20px; height: 20px; border-radius: 50%; border: 2px dashed #d8d8d4; display: flex; align-items: center; justify-content: center; font-size: 15px; line-height: 1; flex: none; }
      .add-checklist__text { font-weight: 500; font-size: 14px; }
      .bottom-bar { height: 5px; width: 120px; background: #e5e5e2; border-radius: 999px; margin: 0 auto 12px; }
      .dialog-backdrop { position: fixed; inset: 0; background: rgba(17,24,39,0.4); display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px; backdrop-filter: blur(2px); }
      .dialog-backdrop.open { display: flex; }
      .dialog { background: #fff; border-radius: 20px; padding: 22px 22px 18px; max-width: 360px; width: 100%; box-shadow: 0 20px 50px rgba(17,24,39,0.25); max-height: 92vh; overflow-y: auto; }
      .dialog h3 { margin: 0 0 14px; font-size: 17px; font-weight: 700; color: #111; }
      .field { margin-bottom: 11px; }
      .field label { display: block; font-size: 11px; color: #6b7280; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.02em; }
      .field input, .field textarea, .field select { width: 100%; border: 1px solid #e5e5e2; border-radius: 10px; padding: 9px 11px; font-size: 14px; color: #111; background: #fafafa; }
      .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--selected); background: #fff; }
      .field textarea { resize: vertical; min-height: 56px; }
      .field-row { display: flex; gap: 8px; }
      .field-row .field { flex: 1; }
      .dialog-actions { display: flex; gap: 8px; margin-top: 18px; }
      .btn-secondary, .btn-primary { flex: 1; padding: 11px; border-radius: 10px; border: none; font-weight: 700; font-size: 14px; }
      .btn-secondary { background: #f3f3f3; color: #374151; }
      .btn-primary { background: var(--selected); color: #fff; }
      .btn-primary:hover { background: #000; }
    </style>
  </head>
  <body>
    <div class="phone-outer">
      <div class="phone">
        <div class="screen">
          <div class="sync-row">
            <div class="sync-indicator local" id="syncIndicator">
              <span class="sync-dot"></span>
              <span id="syncLabel">이 기기</span>
            </div>
          </div>
          <div class="topbar">
            <a href="index.html" class="back-btn" aria-label="홈으로">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6" /></svg>
              <span>홈</span>
            </a>
            <div class="who-am-i">
              <span>나는</span>
              <select id="whoAmI" aria-label="현재 사용자">
                <option value="jae">재</option>
                <option value="kyung">경</option>
                <option value="hye">혜</option>
              </select>
            </div>
          </div>
          <div class="header">
            <div class="month-label">
              <button class="month-nav" id="prevMonth" aria-label="이전 달">‹</button>
              <span class="month-num" id="monthNum">—</span>
              <span class="year-num" id="yearNum">—</span>
              <button class="month-nav" id="nextMonth" aria-label="다음 달">›</button>
            </div>
            <div class="member-stack" aria-label="멤버">
              <span class="avatar" style="background: var(--jae)">재</span>
              <span class="avatar" style="background: var(--kyung)">경</span>
              <span class="avatar" style="background: var(--hye)">혜</span>
            </div>
          </div>
          <div class="card calendar">
            <div class="dow-row">
              <span>월</span><span>화</span><span>수</span><span>목</span><span>금</span>
              <span class="sat">토</span><span class="sun">일</span>
            </div>
            <div id="monthGrid"></div>
            <div class="calendar-legend">
              <span class="legend-chip"></span>
              <span class="legend-text">일정이 있는 날</span>
            </div>
          </div>
          <div class="card week-strip" id="weekStrip"></div>
          <div class="day-header">
            <span class="day-header__label" id="dayLabel">—</span>
            <span class="today-chip" id="todayChip" style="display:none">오늘</span>
            <button class="add-btn" id="addEntryBtn">＋ 일정</button>
          </div>
          <div class="timeline" id="timeline"></div>
          <div class="card checklist">
            <div class="checklist__head">
              <span class="checklist__title">함께 할 일</span>
              <span class="checklist__count" id="checkCount">0 / 0</span>
            </div>
            <div id="checklist"></div>
            <button class="add-checklist" id="addCheckBtn">
              <span class="add-checklist__icon">+</span>
              <span class="add-checklist__text">할 일 추가</span>
            </button>
          </div>
          <div class="bottom-bar"></div>
        </div>
      </div>
    </div>
    <div class="dialog-backdrop" id="entryDialog">
      <div class="dialog" role="dialog" aria-label="일정 입력">
        <h3 id="entryDialogTitle">새 일정</h3>
        <div class="field">
          <label for="entryTitle">제목</label>
          <input type="text" id="entryTitle" placeholder="예) 팀 회의" />
        </div>
        <div class="field-row">
          <div class="field"><label for="entryDate">시작 날짜</label><input type="date" id="entryDate" /></div>
          <div class="field"><label for="entryEndDate">종료 날짜</label><input type="date" id="entryEndDate" /></div>
        </div>
        <div class="field-row">
          <div class="field"><label for="entryTime">시작 시간 (첫날)</label><input type="time" id="entryTime" /></div>
          <div class="field"><label for="entryEnd">끝 시간 (마지막날)</label><input type="time" id="entryEnd" /></div>
        </div>
        <div class="field">
          <label for="entryWho">기록자</label>
          <select id="entryWho">
            <option value="jae">재</option>
            <option value="kyung">경</option>
            <option value="hye">혜</option>
          </select>
        </div>
        <div class="field"><label for="entryLoc">장소</label><input type="text" id="entryLoc" placeholder="예) 강남역" /></div>
        <div class="field"><label for="entryMemo">메모</label><textarea id="entryMemo" placeholder="간단한 메모"></textarea></div>
        <div class="dialog-actions">
          <button class="btn-secondary" id="entryCancel">취소</button>
          <button class="btn-primary" id="entrySave">저장</button>
        </div>
      </div>
    </div>
    <div class="dialog-backdrop" id="checkDialog">
      <div class="dialog" role="dialog" aria-label="할 일 입력">
        <h3 id="checkDialogTitle">할 일 추가</h3>
        <div class="field"><label for="checkLabel">내용</label><input type="text" id="checkLabel" placeholder="예) 케이크 예약" /></div>
        <div class="field-row">
          <div class="field">
            <label for="checkWho">담당</label>
            <select id="checkWho">
              <option value="jae">재</option>
              <option value="kyung">경</option>
              <option value="hye">혜</option>
            </select>
          </div>
          <div class="field"><label for="checkDue">종료 날짜</label><input type="date" id="checkDue" /></div>
        </div>
        <div class="dialog-actions">
          <button class="btn-secondary" id="checkCancel">취소</button>
          <button class="btn-primary" id="checkSave">저장</button>
        </div>
      </div>
    </div>

    <!-- Firebase 설정 파일 (먼저 로드) -->
    <script src="firebase-config.js"></script>

    <!-- 앱 본체 -->
    <script type="module">
      const PEOPLE = {
        jae:   { initial: '재', color: '#3E6FE0' },
        kyung: { initial: '경', color: '#2F9C8B' },
        hye:   { initial: '혜', color: '#E0648C' },
      };
      const today = new Date(); today.setHours(0,0,0,0);
      let selectedDate = new Date(today);
      let viewMonth = new Date(today); viewMonth.setDate(1);
      let openEntryIds = new Set();
      let editingEntryId = null;
      let editingCheckId = null;
      let cacheEntries = [];   // flat array: [{ id, title, time, end, date, endDate, who, loc, memo }, ...]
      let cacheChecks = [];

      // 특정 날짜와 겹치는 일정 (여러 날 걸치는 일정 포함)
      function entriesForDate(dateStr) {
        return cacheEntries.filter(e => {
          const start = e.date;
          const end = e.endDate || e.date;
          return dateStr >= start && dateStr <= end;
        });
      }
      // 여러 날 일정에서 특정 날짜가 몇 일차인지 (1부터 시작)
      function dayIndex(entry, dateStr) {
        if (!entry.date) return 1;
        const [ys,ms,ds] = entry.date.split('-').map(Number);
        const [yd,md,dd] = dateStr.split('-').map(Number);
        const start = new Date(ys, ms-1, ds);
        const cur = new Date(yd, md-1, dd);
        return Math.round((cur - start) / 86400000) + 1;
      }
      function totalDays(entry) {
        const end = entry.endDate || entry.date;
        if (!entry.date || !end) return 1;
        const [ys,ms,ds] = entry.date.split('-').map(Number);
        const [ye,me,de] = end.split('-').map(Number);
        return Math.round((new Date(ye,me-1,de) - new Date(ys,ms-1,ds)) / 86400000) + 1;
      }

      const ymd = (d) => {
        const yy = d.getFullYear();
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const dd = String(d.getDate()).padStart(2,'0');
        return yy + '-' + mm + '-' + dd;
      };
      const isSameDay = (a,b) => ymd(a) === ymd(b);
      const isSameMonth = (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth();
      const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
      const escapeHtml = (s) => String(s).replace(/[&<>"']/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[ch]);

      const backend = { mode: 'local', db: null, firestore: null };

      function setSyncIndicator(mode, msg) {
        const ind = document.getElementById('syncIndicator');
        const lbl = document.getElementById('syncLabel');
        ind.classList.remove('cloud','local','error');
        if (mode === 'firebase') { ind.classList.add('cloud'); lbl.textContent = '실시간 공유'; }
        else if (mode === 'error') { ind.classList.add('error'); lbl.textContent = msg || '연결 오류'; }
        else { ind.classList.add('local'); lbl.textContent = '이 기기'; }
      }

      async function tryInitFirebase() {
        const cfg = window.FIREBASE_CONFIG;
        if (!cfg) {
          console.log('[Firebase] firebase-config.js 가 로드되지 않았어요. localStorage로 전환합니다.');
          return false;
        }
        if (!cfg.projectId || cfg.projectId === 'PASTE_HERE' || cfg.apiKey === 'PASTE_HERE') {
          console.log('[Firebase] firebase-config.js 의 PASTE_HERE 값을 채우지 않았어요. localStorage로 전환합니다.');
          return false;
        }
        console.log('[Firebase] 초기화 시도 중... projectId =', cfg.projectId);
        try {
          const appMod = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
          const fsMod  = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
          const app = appMod.initializeApp(cfg);
          const db = fsMod.getFirestore(app);
          backend.mode = 'firebase';
          backend.db = db;
          backend.firestore = fsMod;
          subscribeFirestore();
          setSyncIndicator('firebase');
          console.log('[Firebase] ✓ 연결 완료. 실시간 동기화 시작.');
          return true;
        } catch (e) {
          console.error('[Firebase] 초기화 실패:', e);
          setSyncIndicator('error', '연결 오류');
          return false;
        }
      }

      function subscribeFirestore() {
        const { collection, onSnapshot } = backend.firestore;
        onSnapshot(collection(backend.db, 'entries'), (snap) => {
          const arr = [];
          snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
          cacheEntries = arr;
          console.log('[Firestore] entries 동기화:', arr.length + '개');
          render();
        }, (err) => {
          console.error('[Firestore] entries 구독 오류:', err.code, err.message);
          setSyncIndicator('error', 'Firestore 미설정');
        });
        onSnapshot(collection(backend.db, 'checklist'), (snap) => {
          const arr = [];
          snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
          cacheChecks = arr;
          console.log('[Firestore] checklist 동기화:', arr.length + '개');
          render();
        }, (err) => {
          console.error('[Firestore] checklist 구독 오류:', err.code, err.message);
        });
      }

      function localLoadAll() {
        try {
          const raw = JSON.parse(localStorage.getItem('rkh.schedules') || '[]');
          // 옛 형식(dict) 자동 변환
          if (Array.isArray(raw)) cacheEntries = raw;
          else cacheEntries = Object.values(raw).flat();
        } catch { cacheEntries = []; }
        try { cacheChecks = JSON.parse(localStorage.getItem('rkh.checklist') || '[]'); } catch { cacheChecks = []; }
      }
      function localSaveSchedules() { localStorage.setItem('rkh.schedules', JSON.stringify(cacheEntries)); }
      function localSaveChecks() { localStorage.setItem('rkh.checklist', JSON.stringify(cacheChecks)); }

      async function saveEntryToBackend(entry) {
        if (backend.mode === 'firebase') {
          const { doc, setDoc } = backend.firestore;
          await setDoc(doc(backend.db, 'entries', entry.id), entry);
        } else {
          const i = cacheEntries.findIndex(x => x.id === entry.id);
          if (i >= 0) cacheEntries[i] = entry; else cacheEntries.push(entry);
          localSaveSchedules();
          render();
        }
      }
      async function deleteEntryFromBackend(entry) {
        if (backend.mode === 'firebase') {
          const { doc, deleteDoc } = backend.firestore;
          await deleteDoc(doc(backend.db, 'entries', entry.id));
        } else {
          cacheEntries = cacheEntries.filter(x => x.id !== entry.id);
          localSaveSchedules();
          render();
        }
      }
      async function saveCheckToBackend(item) {
        if (backend.mode === 'firebase') {
          const { doc, setDoc } = backend.firestore;
          await setDoc(doc(backend.db, 'checklist', item.id), item);
        } else {
          const i = cacheChecks.findIndex(x => x.id === item.id);
          if (i >= 0) cacheChecks[i] = item; else cacheChecks.push(item);
          localSaveChecks();
          render();
        }
      }
      async function deleteCheckFromBackend(id) {
        if (backend.mode === 'firebase') {
          const { doc, deleteDoc } = backend.firestore;
          await deleteDoc(doc(backend.db, 'checklist', id));
        } else {
          cacheChecks = cacheChecks.filter(x => x.id !== id);
          localSaveChecks();
          render();
        }
      }

      const loadCurrentUser = () => localStorage.getItem('rkh.currentUser') || 'jae';
      const saveCurrentUser = (u) => localStorage.setItem('rkh.currentUser', u);

      function render() {
        renderHeader(); renderMonth(); renderWeek(); renderDayHeader(); renderTimeline(); renderChecklist();
      }
      function renderHeader() {
        document.getElementById('monthNum').textContent = (viewMonth.getMonth()+1) + '월';
        document.getElementById('yearNum').textContent = viewMonth.getFullYear();
      }
      function renderMonth() {
        const grid = document.getElementById('monthGrid');
        grid.innerHTML = '';
        const year = viewMonth.getFullYear();
        const mon = viewMonth.getMonth();
        const first = new Date(year, mon, 1);
        const daysInMonth = new Date(year, mon+1, 0).getDate();
        const firstDow = (first.getDay() + 6) % 7;
        const cells = [];
        for (let i=0; i<firstDow; i++) cells.push(null);
        for (let d=1; d<=daysInMonth; d++) cells.push(d);
        while (cells.length % 7 !== 0) cells.push(null);
        const eventDays = new Set();
        for (let d=1; d<=daysInMonth; d++) {
          const key = ymd(new Date(year, mon, d));
          if (entriesForDate(key).length > 0) eventDays.add(d);
        }
        let row;
        cells.forEach((d, i) => {
          if (i % 7 === 0) { row = document.createElement('div'); row.className = 'week-row'; grid.appendChild(row); }
          const cell = document.createElement('div');
          cell.className = 'day-cell' + (d === null ? ' empty' : '');
          if (d !== null) {
            const cellDate = new Date(year, mon, d);
            const bubble = document.createElement('span');
            bubble.className = 'day-bubble' +
              (eventDays.has(d) ? ' has-event' : '') +
              (isSameDay(cellDate, today) ? ' today' : '') +
              (isSameDay(cellDate, selectedDate) ? ' selected' : '');
            bubble.textContent = d;
            cell.appendChild(bubble);
            cell.addEventListener('click', () => { selectedDate = cellDate; openEntryIds.clear(); render(); });
          }
          row.appendChild(cell);
        });
      }
      function renderWeek() {
        const strip = document.getElementById('weekStrip');
        strip.innerHTML = '';
        const monStart = new Date(selectedDate);
        const dow = (monStart.getDay() + 6) % 7;
        monStart.setDate(monStart.getDate() - dow);
        const dows = ['월','화','수','목','금','토','일'];
        for (let i=0; i<7; i++) {
          const dt = new Date(monStart);
          dt.setDate(monStart.getDate() + i);
          const isSel = isSameDay(dt, selectedDate);
          const isToday = isSameDay(dt, today);
          const isWk = i >= 5;
          const col = document.createElement('button');
          col.className = 'week-col' + (isSel ? ' selected' : '') + (isToday ? ' today' : '') + (isWk ? ' weekend' : '');
          col.innerHTML = '<span class="dow">' + dows[i] + '</span><span class="date">' + dt.getDate() + '</span><span class="dot"></span>';
          col.addEventListener('click', () => {
            selectedDate = dt;
            if (!isSameMonth(viewMonth, dt)) viewMonth = new Date(dt.getFullYear(), dt.getMonth(), 1);
            openEntryIds.clear(); render();
          });
          strip.appendChild(col);
        }
      }
      function renderDayHeader() {
        const dows = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
        document.getElementById('dayLabel').textContent =
          (selectedDate.getMonth()+1) + '월 ' + selectedDate.getDate() + '일 ' + dows[selectedDate.getDay()];
        document.getElementById('todayChip').style.display = isSameDay(selectedDate, today) ? 'inline-block' : 'none';
      }
      function renderTimeline() {
        const timeline = document.getElementById('timeline');
        const key = ymd(selectedDate);
        // 시간 순 정렬: 다중일은 첫날이면 e.time, 아니면 뒤로
        const entries = entriesForDate(key).slice().sort((a,b) => {
          const at = (a.date === key) ? (a.time || '') : 'zzz';
          const bt = (b.date === key) ? (b.time || '') : 'zzz';
          return at.localeCompare(bt);
        });
        timeline.innerHTML = '';
        if (entries.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'timeline-empty';
          empty.textContent = '일정이 없어요. ＋ 버튼으로 추가해보세요.';
          timeline.appendChild(empty);
          return;
        }
        entries.forEach((e, idx) => {
          const person = PEOPLE[e.who] || PEOPLE.jae;
          const wrap = document.createElement('div');
          wrap.className = 'entry';
          wrap.style.setProperty('--node-color', person.color);
          const isOpen = openEntryIds.has(e.id);
          // 다중일 로직: 첫날 시작시간, 마지막날 끝시간, 중간엔 아무것도
          const isMulti = e.endDate && e.endDate !== e.date;
          const isFirst = key === e.date;
          const isLast  = key === (e.endDate || e.date);
          let railTime = '';
          let spanBadge = '';
          if (!isMulti) {
            railTime = e.time || '';
          } else if (isFirst) {
            railTime = e.time || '';
            spanBadge = '<span class="entry__span">1/' + totalDays(e) + ' · 시작</span>';
          } else if (isLast) {
            railTime = e.end ? '~' + e.end : '';
            spanBadge = '<span class="entry__span">' + totalDays(e) + '/' + totalDays(e) + ' · 끝</span>';
          } else {
            railTime = '⋯';
            spanBadge = '<span class="entry__span">' + dayIndex(e, key) + '/' + totalDays(e) + '</span>';
          }
          let detail = '';
          if (isOpen) {
            const rangeText = isMulti
              ? escapeHtml(e.date) + (e.time ? ' ' + escapeHtml(e.time) : '') + ' → ' + escapeHtml(e.endDate) + (e.end ? ' ' + escapeHtml(e.end) : '')
              : escapeHtml(e.time || '') + (e.end ? ' – ' + escapeHtml(e.end) : '');
            const timeRow = '<div class="row time">🕑 ' + rangeText + '</div>';
            const locRow = e.loc ? '<div class="row loc">📍 ' + escapeHtml(e.loc) + '</div>' : '';
            const memoRow = e.memo ? '<div class="row memo">📝 ' + escapeHtml(e.memo) + '</div>' : '';
            const actions = '<div class="entry__actions"><span class="entry__meta-text">기록 · ' + person.initial + '</span><button class="entry__edit" data-edit="' + e.id + '">수정</button><button class="entry__del" data-del="' + e.id + '">삭제</button></div>';
            detail = '<div class="entry__detail">' + timeRow + locRow + memoRow + actions + '</div>';
          }
          const lineStyle = (idx === entries.length - 1) ? ' style="background:transparent"' : '';
          wrap.innerHTML =
            '<div class="entry__rail">' +
              '<span class="entry__time">' + escapeHtml(railTime) + '</span>' +
              '<span class="entry__node"></span>' +
              '<span class="entry__line"' + lineStyle + '></span>' +
            '</div>' +
            '<div class="entry__card" data-id="' + e.id + '">' +
              '<div class="entry__head">' +
                '<span class="entry__title">' + escapeHtml(e.title || '제목 없음') + '</span>' +
                spanBadge +
                '<span class="entry__badge">' + person.initial + '</span>' +
              '</div>' +
              detail +
            '</div>';
          timeline.appendChild(wrap);
        });
        timeline.querySelectorAll('.entry__card').forEach(card => {
          card.addEventListener('click', (ev) => {
            if (ev.target.closest('[data-del]') || ev.target.closest('[data-edit]')) return;
            const id = card.dataset.id;
            if (openEntryIds.has(id)) openEntryIds.delete(id); else openEntryIds.add(id);
            renderTimeline();
          });
        });
        timeline.querySelectorAll('[data-edit]').forEach(btn => {
          btn.addEventListener('click', (ev) => {
            ev.stopPropagation();
            const id = btn.dataset.edit;
            const e = cacheEntries.find(x => x.id === id);
            if (e) openEntryDialog(e);
          });
        });
        timeline.querySelectorAll('[data-del]').forEach(btn => {
          btn.addEventListener('click', async (ev) => {
            ev.stopPropagation();
            const id = btn.dataset.del;
            if (!confirm('이 일정을 삭제할까요?')) return;
            const e = cacheEntries.find(x => x.id === id);
            if (e) { await deleteEntryFromBackend(e); openEntryIds.delete(id); }
          });
        });
      }
      function sortChecks(items) {
        return items.slice().sort((a,b) => {
          if (!!a.done !== !!b.done) return a.done ? 1 : -1;
          const da = a.due || '9999-99-99';
          const db = b.due || '9999-99-99';
          return da.localeCompare(db);
        });
      }
      function formatDue(due) {
        if (!due) return null;
        const parts = due.split('-').map(Number);
        const dueDate = new Date(parts[0], parts[1]-1, parts[2]);
        const diff = Math.round((dueDate - today) / 86400000);
        let cls = '', text;
        if (diff < 0) { cls = 'overdue'; text = '~ ' + parts[1] + '/' + parts[2] + ' (' + (-diff) + '일 지남)'; }
        else if (diff === 0) { cls = 'today'; text = '~ 오늘'; }
        else if (diff === 1) { text = '~ 내일'; }
        else if (diff < 7) { text = '~ ' + diff + '일 후'; }
        else { text = '~ ' + parts[1] + '/' + parts[2]; }
        return { cls, text };
      }
      function renderChecklist() {
        const list = document.getElementById('checklist');
        const items = sortChecks(cacheChecks);
        list.innerHTML = '';
        items.forEach(t => {
          const person = PEOPLE[t.who] || PEOPLE.jae;
          const row = document.createElement('div');
          row.className = 'check-item' + (t.done ? ' done' : '');
          const due = formatDue(t.due);
          const dueHtml = due ? '<span class="check-due ' + due.cls + '">' + due.text + '</span>' : '';
          row.innerHTML =
            '<span class="check-box">' + (t.done ? '✓' : '') + '</span>' +
            '<div class="check-body">' +
              '<span class="check-label">' + escapeHtml(t.label) + '</span>' + dueHtml +
            '</div>' +
            '<span class="check-who" style="background:' + person.color + '" data-edit="' + t.id + '" title="수정">' + person.initial + '</span>' +
            '<button class="check-del" data-del="' + t.id + '" title="삭제">×</button>';
          row.addEventListener('click', async (ev) => {
            if (ev.target.closest('[data-del]') || ev.target.closest('[data-edit]')) return;
            await saveCheckToBackend({ ...t, done: !t.done });
          });
          row.querySelector('[data-edit]').addEventListener('click', (ev) => { ev.stopPropagation(); openCheckDialog(t); });
          row.querySelector('[data-del]').addEventListener('click', async (ev) => { ev.stopPropagation(); await deleteCheckFromBackend(t.id); });
          list.appendChild(row);
        });
        const done = items.filter(t => t.done).length;
        document.getElementById('checkCount').textContent = done + ' / ' + items.length;
      }

      function openEntryDialog(existing) {
        editingEntryId = existing ? existing.id : null;
        document.getElementById('entryDialogTitle').textContent = existing ? '일정 수정' : '새 일정';
        document.getElementById('entryTitle').value = existing?.title || '';
        document.getElementById('entryDate').value = existing?.date || ymd(selectedDate);
        document.getElementById('entryEndDate').value = existing?.endDate || existing?.date || ymd(selectedDate);
        document.getElementById('entryTime').value = existing?.time || '';
        document.getElementById('entryEnd').value = existing?.end || '';
        document.getElementById('entryWho').value = existing?.who || loadCurrentUser();
        document.getElementById('entryLoc').value = existing?.loc || '';
        document.getElementById('entryMemo').value = existing?.memo || '';
        document.getElementById('entryDialog').classList.add('open');
        setTimeout(() => document.getElementById('entryTitle').focus(), 50);
      }
      function closeEntryDialog() { document.getElementById('entryDialog').classList.remove('open'); editingEntryId = null; }
      async function saveEntry() {
        const title = document.getElementById('entryTitle').value.trim();
        if (!title) { alert('제목을 입력해주세요.'); return; }
        const startDate = document.getElementById('entryDate').value || ymd(selectedDate);
        let endDate = document.getElementById('entryEndDate').value || startDate;
        // 종료가 시작보다 앞이면 시작으로 맞춤
        if (endDate < startDate) endDate = startDate;
        const entry = {
          id: editingEntryId || uid(),
          title,
          time: document.getElementById('entryTime').value,
          end:  document.getElementById('entryEnd').value,
          who:  document.getElementById('entryWho').value,
          loc:  document.getElementById('entryLoc').value.trim(),
          memo: document.getElementById('entryMemo').value.trim(),
          date: startDate,
          endDate: endDate,
        };
        // 다이얼로그 먼저 닫고, 저장은 백그라운드에서 (실패해도 화면 안 멈춤)
        closeEntryDialog();
        try {
          await saveEntryToBackend(entry);
        } catch (e) {
          console.error('[일정 저장 실패]', e);
          alert('저장에 실패했어요: ' + (e?.message || e));
        }
      }
      function openCheckDialog(existing) {
        editingCheckId = existing ? existing.id : null;
        document.getElementById('checkDialogTitle').textContent = existing ? '할 일 수정' : '할 일 추가';
        document.getElementById('checkLabel').value = existing?.label || '';
        document.getElementById('checkWho').value = existing?.who || loadCurrentUser();
        document.getElementById('checkDue').value = existing?.due || '';
        document.getElementById('checkDialog').classList.add('open');
        setTimeout(() => document.getElementById('checkLabel').focus(), 50);
      }
      function closeCheckDialog() { document.getElementById('checkDialog').classList.remove('open'); editingCheckId = null; }
      async function saveCheck() {
        const label = document.getElementById('checkLabel').value.trim();
        if (!label) { alert('할 일 내용을 입력해주세요.'); return; }
        const who = document.getElementById('checkWho').value;
        const due = document.getElementById('checkDue').value || null;
        let item;
        if (editingCheckId) {
          const found = cacheChecks.find(x => x.id === editingCheckId);
          item = { ...(found || {}), id: editingCheckId, label, who, due, done: !!found?.done };
        } else {
          item = { id: uid(), label, who, due, done: false };
        }
        closeCheckDialog();
        try {
          await saveCheckToBackend(item);
        } catch (e) {
          console.error('[할 일 저장 실패]', e);
          alert('저장에 실패했어요: ' + (e?.message || e));
        }
      }

      document.getElementById('prevMonth').addEventListener('click', () => { viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth()-1, 1); render(); });
      document.getElementById('nextMonth').addEventListener('click', () => { viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth()+1, 1); render(); });
      document.getElementById('addEntryBtn').addEventListener('click', () => openEntryDialog(null));
      document.getElementById('addCheckBtn').addEventListener('click', () => openCheckDialog(null));
      document.getElementById('entryCancel').addEventListener('click', closeEntryDialog);
      document.getElementById('entrySave').addEventListener('click', saveEntry);
      document.getElementById('checkCancel').addEventListener('click', closeCheckDialog);
      document.getElementById('checkSave').addEventListener('click', saveCheck);
      document.getElementById('entryDialog').addEventListener('click', (e) => { if (e.target.id === 'entryDialog') closeEntryDialog(); });
      document.getElementById('checkDialog').addEventListener('click', (e) => { if (e.target.id === 'checkDialog') closeCheckDialog(); });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { closeEntryDialog(); closeCheckDialog(); }
        if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
          if (document.getElementById('entryDialog').classList.contains('open')) saveEntry();
          else if (document.getElementById('checkDialog').classList.contains('open')) saveCheck();
        }
      });
      const whoSel = document.getElementById('whoAmI');
      whoSel.value = loadCurrentUser();
      whoSel.addEventListener('change', () => saveCurrentUser(whoSel.value));

      (async () => {
        const ok = await tryInitFirebase();
        if (!ok) { backend.mode = 'local'; setSyncIndicator('local'); localLoadAll(); render(); }
        else { render(); }
      })();
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .then(reg => console.log('[PWA] SW', reg.scope))
            .catch(err => console.warn('[PWA] SW err', err));
        });
      }
    </script>
  </body>
