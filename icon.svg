<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fefcfa"/>
      <stop offset="55%"  stop-color="#f5f0e7"/>
      <stop offset="80%"  stop-color="#e0eef5"/>
      <stop offset="100%" stop-color="#a3c8db"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="42%" r="22%">
      <stop offset="0%"   stop-color="#fff4d3" stop-opacity="0.95"/>
      <stop offset="60%"  stop-color="#f9e4a3" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f9e4a3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7ca9c0"/>
      <stop offset="100%" stop-color="#3e6e8a"/>
    </linearGradient>
  </defs>

  <!-- 배경 (둥근 사각) -->
  <rect width="512" height="512" rx="100" fill="url(#sky)"/>

  <!-- 태양 빛 (부드럽게 흩어짐) -->
  <circle cx="256" cy="215" r="180" fill="url(#sun)"/>
  <circle cx="256" cy="210" r="64"  fill="#fff4d3" opacity="0.85"/>

  <!-- 수평선 -->
  <line x1="80" y1="345" x2="432" y2="345"
        stroke="#3a5e7a" stroke-width="1.5" opacity="0.35"/>

  <!-- 바다 -->
  <rect x="0" y="345" width="512" height="167" fill="url(#sea)" opacity="0.85"/>

  <!-- 작은 산토리니 건물 실루엣 (수평선 위) -->
  <g fill="#fefcfa" opacity="0.92">
    <rect x="148" y="330" width="14" height="15"/>
    <rect x="170" y="324" width="18" height="21"/>
    <rect x="196" y="332" width="12" height="13"/>
    <rect x="320" y="328" width="16" height="17"/>
    <rect x="344" y="322" width="20" height="23"/>
    <rect x="372" y="333" width="11" height="12"/>
  </g>
  <g fill="#2c5d8a" opacity="0.85">
    <ellipse cx="178" cy="324" rx="9" ry="6"/>
    <ellipse cx="354" cy="322" rx="10" ry="6"/>
  </g>

  <!-- 가족 머리글자 -->
  <text x="256" y="455"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="40"
        font-weight="400"
        letter-spacing="8"
        fill="#fefcfa"
        opacity="0.9">JKH</text>
</svg>
